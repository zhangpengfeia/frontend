<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>简单视频直播播放示例</title>
  <!-- 使用 hls.js 播放 HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <h2>直播播放端</h2>
  <video id="video" controls autoplay style="width: 640px; height: 360px;"></video>

  <script>
    const video = document.getElementById('video');
    const videoSrc = 'http://localhost:7001/live/stream/index.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    }
  </script>
</body>
</html>
